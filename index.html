<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Marble Cake Family is the home base for the Marble Cake world, connected to Dummeez, future merch, stories, drops, and everything coming next."
    />
    <meta property="og:title" content="Marble Cake Family" />
    <meta
      property="og:description"
      content="The home base for Marble Cake Family, Dummeez connections, merch, stories, and upcoming drops."
    />
    <meta property="og:image" content="/assets/marble-cake.png" />
    <meta property="og:type" content="website" />
    <link
      rel="preload"
      href="/fonts/goonies.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <title>Marble Cake Family</title>
  </head>
  <body>
    <main class="image-stage" aria-label="Marble Cake Family artwork">
      <div class="image-stage__camera">
        <div class="image-stage__drift">
          <video
            class="image-stage__background image-stage__background-video"
            src="/assets/marble-cake-scroll-video.mp4"
            poster="/assets/marble-cake-video-poster.jpg"
            preload="auto"
            playsinline
            muted
            disablepictureinpicture
            data-scroll-scrub-video
            aria-hidden="true"
          ></video>
          <img
            class="image-stage__car"
            src="/assets/car-and-dummee.png"
            alt="Car and Dummee artwork"
          />
        </div>
      </div>
      <h1 class="image-stage__title" aria-label="Marble Cake Family">
        <span class="image-stage__title-main">
          <span>Marble</span>
          <span>Cake</span>
        </span>
        <span class="image-stage__title-accent">Family</span>
      </h1>
      <section class="image-stage__copy" aria-label="Marble Cake Family scroll text">
        <p class="image-stage__copy-line image-stage__copy-line--one" aria-label="Yo son I had">
          <span>Yo Son</span>
          <span>I Had</span>
        </p>
        <p class="image-stage__copy-line image-stage__copy-line--two" aria-label="Crazy Visions">
          <span class="image-stage__copy-pink">Crazy</span>
          <span class="image-stage__copy-yellow">Visions</span>
        </p>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
