<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Marble Cake Family is the home base for the Marble Cake world, connected to Dummeez, future merch, stories, drops, and everything coming next."
    />
    <meta property="og:title" content="Marble Cake Family" />
    <meta
      property="og:description"
      content="The home base for Marble Cake Family, Dummeez connections, merch, stories, and upcoming drops."
    />
    <meta property="og:image" content="/assets/marble-cake.png" />
    <meta property="og:type" content="website" />
    <link
      rel="preload"
      href="/fonts/goonies.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <title>Marble Cake Family</title>
  </head>
  <body>
    <main class="image-stage" aria-label="Marble Cake Family artwork">
      <div class="image-stage__camera">
        <div class="image-stage__drift">
          <video
            class="image-stage__background image-stage__background-video"
            src="/assets/marble-cake-planet.mp4"
            poster="/assets/marble-cake-planet-poster.jpg"
            preload="auto"
            playsinline
            muted
            disablepictureinpicture
            data-scroll-scrub-video
            data-scroll-scrub-fps="120"
            aria-hidden="true"
          ></video>
          <img
            class="image-stage__car"
            src="/assets/car-and-dummee.png"
            alt="Car and Dummee artwork"
          />
        </div>
      </div>
      <h1 class="image-stage__title" aria-label="Marble Cake Family I had crazy visions">
        <span class="image-stage__title-main">
          <span>Marble</span>
          <span>Cake</span>
        </span>
        <span class="image-stage__title-accent">Family</span>
        <span class="image-stage__title-tagline" aria-hidden="true">
          <span class="image-stage__title-tagline-white">Yo Son</span>
          <span class="image-stage__title-tagline-white">I Had</span>
          <span class="image-stage__title-tagline-mixed" aria-label="Crazy Visions">
            <span class="image-stage__title-tagline-pink image-stage__crazy-word" aria-hidden="true">
              <span style="--i: 0">C</span>
              <span style="--i: 1">R</span>
              <span style="--i: 2">A</span>
              <span style="--i: 3">Z</span>
              <span style="--i: 4">Y</span>
            </span>
            <span class="image-stage__title-tagline-yellow image-stage__crazy-word" aria-hidden="true">
              <span style="--i: 5">V</span>
              <span style="--i: 6">I</span>
              <span style="--i: 7">S</span>
              <span style="--i: 8">I</span>
              <span style="--i: 9">O</span>
              <span style="--i: 10">N</span>
              <span style="--i: 11">S</span>
            </span>
          </span>
        </span>
      </h1>
      <p class="image-stage__legend">
        <span>A family. A vibe. A Universe of our own.</span>
        <span>Marble Cake Family is more than a brand.</span>
        <span>It's a... Family!</span>
      </p>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
